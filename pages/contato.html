<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Contato - Arcgarden</title>

   <title>Sobre - Arcgarden</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/header.css">
  <link rel="stylesheet" href="../css/index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
</head>

<body>


  <main>
    <section>
      <div class="contato__container">
 
        <h2 class="contato__titulo">Fale <em>conosco</em></h2>
        <p class="contato__subtitulo">Envie suas dúvidas, sugestões ou feedback sobre o Arcgarden!</p>
 
        <div class="contato__wrapper">
        <form class="contato__form" id="contato-form">
 
          <div class="contato__campo">
            <label>Nome completo</label>
            <input type="text" placeholder="Seu nome" required>
          </div>
 
          <div class="contato__campo">
            <label>E-mail</label>
            <input type="email" placeholder="seu@email.com" required>
          </div>
 
          <div class="contato__campo">
            <label>Assunto</label>
            <select required>
              <option value="">Selecione</option>
              <option>Dúvida</option>
              <option>Sugestão</option>
              <option>Problema</option>
            </select>
          </div>
 
          <div class="contato__campo">
            <label>Mensagem</label>
            <textarea placeholder="Escreva sua mensagem" required></textarea>
          </div>
 
          <button class="contato__btn" type="submit">Enviar mensagem</button>
 
        </form>
 
        <div class="contato__info">
          <h3>Informações</h3>
          <p>E-mail</p>
          <p class="contato__info">oarcgarden@gmail.com</p>
          </div>
        </div>
 
      </div>
    </section>
  </main>
 
  <footer>
    <div class="footer__container">
      <p>Arcgarden - Challenge FIAP 2026</p>
    </div>
  </footer>
 
  <script src="script.js"></script>
 

</body>
</html>
